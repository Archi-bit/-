{% extends "base.html" %}

{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-8 col-lg-6">

            <div class="card shadow-lg border-0 rounded-4">
                <div class="card-header bg-success text-white text-center py-4 rounded-top-4">
                    <h2 class="mb-1">Создать задачу</h2>
                    <p class="mb-0 small">Заполните форму ниже</p>
                </div>

                <div class="card-body p-4">

                    <form method="post">
                        {% csrf_token %}

                        <div class="mb-4">
                            <label class="form-label fw-semibold">Название задачи</label>
                            {{ form.title }}
                            <div class="form-text">Введите короткое и понятное название</div>
                        </div>

                        <div class="mb-4">
                            <label class="form-label fw-semibold">Описание</label>
                            {{ form.description }}
                            <div class="form-text">Добавьте детали задачи</div>
                        </div>

                        <div class="mb-4">
                            <label class="form-label fw-semibold">Категория</label>
                            {{ form.category }}
                        </div>

                        <div class="d-grid mt-4">
                            <button class="btn btn-success btn-lg rounded-3 shadow-sm" type="submit">
                                Создать задачу
                            </button>
                        </div>
                    </form>

                </div>

                <div class="card-footer bg-light text-center py-3">
                    <small class="text-muted">После создания задача появится в списке</small>
                </div>
            </div>

        </div>
    </div>
</div>
{% endblock %}
